<!DOCTYPE html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="styles.css">
        <link rel="icon" type="image/x-icon" href="../assets/icon.png">
        <title>Asteroids</title>
    </head>
    <body>

        <div class="initial-overlay">
            <h1 class="game-hero">Asteroids</h1>
            <label for="name-box">Enter player name:</label>
            <input type="text" name="name-box" id="player-name" placeholder="Player1">
            <button class="start-button">Start</button>
        </div>

        <div class="canvas-container">
            <div class="score-board">W</div>
            <canvas class="canvas"></canvas>
        </div>
        
        <div class="end-overlay">
            <h1 class="game-hero">GAME OVER</h1>
            <h2>Score:</h2>
            <h3></h3>
        </div>
    </body>
<script src="./script.js"></script>
